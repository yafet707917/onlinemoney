<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>System Error</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff00;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    #terminal {
      width: 90%;
      max-width: 800px;
      font-size: 18px;
    }
    .line {
      opacity: 0;
      animation: fadeIn 0.5s forwards;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    #popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      color: red;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <div id="popup">⚠ SYSTEM HACKED ⚠<br>All files deleted!</div>

  <script>
    const terminal = document.getElementById("terminal");
    const popup = document.getElementById("popup");

    const lines = [
      "Initializing system...",
      "Loading modules...",
      "Connecting to server...",
      "Access granted...",
      "Downloading private data...",
      "ERROR: Unauthorized access detected!",
      "Injecting virus...",
      "Deleting system32...",
      "WARNING: System failure imminent!"
    ];

    let i = 0;

    function typeLine() {
      if (i < lines.length) {
        const div = document.createElement("div");
        div.className = "line";
        div.textContent = lines[i];
        terminal.appendChild(div);
        i++;
        setTimeout(typeLine, 800);
      } else {
        setTimeout(() => {
          popup.style.display = "flex";
        }, 1000);
      }
    }

    setTimeout(typeLine, 1000);

    // Optional: fake screen shake
    setInterval(() => {
      document.body.style.transform = `translate(${Math.random()*10-5}px, ${Math.random()*10-5}px)`;
    }, 50);
  </script>
</body>
</html>
